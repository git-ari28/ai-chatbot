services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - ollama

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data: